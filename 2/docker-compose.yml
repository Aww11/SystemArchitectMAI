version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: store_postgres
    environment:
      POSTGRES_USER: store_user
      POSTGRES_PASSWORD: store_password
      POSTGRES_DB: store_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Одноразовый контейнер для инициализации БД
  db-init:
    build: .
    container_name: store_db_init
    environment:
      DATABASE_URL: postgresql://store_user:store_password@postgres:5432/store_db
    depends_on:
      postgres:
        condition: service_healthy
    command: python init_db.py
    restart: "no"

  # Основной API сервис
  api:
    build: .
    container_name: store_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://store_user:store_password@postgres:5432/store_db
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      db-init:
        condition: service_completed_successfully
    volumes:
      - ./app:/app/app  # Для hot-reload при разработке
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  postgres_data: